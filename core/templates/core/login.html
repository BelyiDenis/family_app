{% extends 'core/base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 50px auto;">
    <div style="text-align: center; margin-bottom: 30px;">
        <div style="font-size: 64px; margin-bottom: 16px;">🏠</div>
        <h1 style="font-size: 28px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent;">Добро пожаловать!</h1>
        <p style="color: #718096; margin-top: 8px;">Войдите в семейное приложение</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label><i class="fas fa-user"></i> Имя пользователя</label>
            <input type="text" name="username" placeholder="Введите имя" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0;">
        <p style="color: #718096;">
            Нет аккаунта? 
            <a href="{% url 'register' %}" style="color: #667eea; text-decoration: none; font-weight: 600;">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
