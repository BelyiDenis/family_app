{% extends 'core/base.html' %}
{% block title %}Код приглашения{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto;">
    <div class="card" style="text-align: center;">
        <div style="font-size: 64px; margin-bottom: 16px;">🔑</div>
        <h1 style="font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 16px;">
            Код приглашения
        </h1>
        
        <p style="color: #718096; margin-bottom: 20px;">
            Поделитесь этим кодом с членами семьи, чтобы они могли присоединиться
        </p>
        
        <div style="background: #f0f2f5; padding: 20px; border-radius: 16px; margin-bottom: 24px;">
            <div style="font-size: 36px; font-weight: 800; letter-spacing: 8px; color: #667eea;">
                {{ family.invite_code }}
            </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button onclick="copyCode()" class="btn btn-primary">
                <i class="fas fa-copy"></i> Скопировать
            </button>
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-warning">
                    <i class="fas fa-sync"></i> Сгенерировать новый
                </button>
            </form>
        </div>
        
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0;">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> На дашборд
            </a>
        </div>
    </div>
</div>

<script>
function copyCode() {
    const code = '{{ family.invite_code }}';
    navigator.clipboard.writeText(code);
    alert('Код скопирован: ' + code);
}
</script>
{% endblock %}
